<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrinho - Joias Rosa</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #fff;
      color: #333;
    }

    header {
      text-align: center;
      padding: 30px 0;
      font-size: 32px;
      font-weight: bold;
      font-family: 'Georgia', serif;
    }

    .carrinho {
      max-width: 800px;
      margin: 0 auto;
      border: 1px solid #ccc;
      padding: 20px;
    }

    .produto {
      display: flex;
      margin-bottom: 20px;
      gap: 20px;
    }

    .produto img {
      width: 150px;
      height: auto;
      object-fit: cover;
    }

    .detalhes {
      flex-grow: 1;
    }

    .detalhes input {
      width: 100%;
      padding: 5px;
      margin: 5px 0;
    }

    .resumo {
      text-align: right;
      margin-top: 20px;
    }

    .botoes {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }

    button {
      padding: 10px 20px;
      background-color: #b67c7c;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background-color: #a06c6c;
    }
  </style>
</head>
<body>
  <header>DesignFej</header>

  <div class="carrinho">
    <h2>Meu Carrinho</h2>
    <div class="produto">
      <img src="ChatGPT Image 15 de mai. de 2025, 21_46_36.png" alt="Kit Alianças">
      <div class="detalhes">
        <p><strong>Kit Alianças</strong></p>
        <label>Anel - Tamanho Aro:</label>
        <input type="text" placeholder="Digite o tamanho">
        <label>Aliança - Tamanho Aro 1:</label>
        <input type="text" placeholder="Digite o tamanho">
        <label>Aliança - Gravação Aro 1:</label>
        <input type="text" placeholder="Digite o nome">
        <label>Aliança - Tamanho Aro 2:</label>
        <input type="text" placeholder="Digite o tamanho">
        <label>Aliança - Gravação Aro 2:</label>
        <input type="text" placeholder="Digite o nome">
        <p><strong>R$ 3.062,87</strong> (ou 10x de R$306,28)</p>
      </div>
    </div>

    <div class="resumo">
      <p><strong>Subtotal:</strong> R$ 3.062,87</p>
      <p><strong>Cupom:</strong> <input type="text" placeholder="Opcional"></p>
      <p><strong>Frete:</strong> <input type="text" placeholder="CEP"></p>
      <p><strong>Total:</strong> R$ 3.062,87</p>
    </div>

    <div class="botoes">
      <button>Continuar Comprando</button>
      <button>Finalizar Compra</button>
    </div>
  </div>
</body>
</html>
